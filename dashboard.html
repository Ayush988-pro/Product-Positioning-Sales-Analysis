<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Placement Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    .dashboard-container {
      margin-top: 30px;
    }
  </style>
</head>
<body>

<div class="container-fluid dashboard-container">
  <h2 class="text-center mb-4">
    Product Placement Analysis Dashboard
  </h2>

  <!-- Tableau Embed Start -->
  <div class='tableauPlaceholder' id='vizTableau' style='position: relative'>
    <noscript>
      <a href='#'>
        <img alt='Dashboard'
        src='https://public.tableau.com/static/images/po/poductplacementanalysisdashboard/Dashboard1/1.png'
        style='border: none; width:100%;' />
      </a>
    </noscript>
    <object class='tableauViz' style='display:none;'>
      <param name='host_url' value='https://public.tableau.com/' />
      <param name='embed_code_version' value='3' />
      <param name='name' value='poductplacementanalysisdashboard/Dashboard1' />
      <param name='tabs' value='yes' />
      <param name='toolbar' value='yes' />
    </object>
  </div>
  <!-- Tableau Embed End -->

</div>

<script type='text/javascript'>
  var divElement = document.getElementById('vizTableau');
  var vizElement = divElement.getElementsByTagName('object')[0];
  vizElement.style.width = "100%";
  vizElement.style.height = "800px";

  var scriptElement = document.createElement('script');
  scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
  vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

</body>
</html>
